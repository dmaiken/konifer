name: Build and Package Konifer

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docker-compose.yml"
      - ".github/release.yml"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docker-compose.yml"
      - ".github/release.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      # We must install system deps every time, even if Vips is cached.
      # Otherwise, the cached Vips binary won't find libjpeg, libpng, etc.
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config ninja-build wget meson \
            glib2.0-dev libexif-dev libexpat1-dev libfftw3-dev \
            libimagequant-dev libjpeg-turbo8-dev liblcms2-dev \
            libpango1.0-dev libpng-dev \
            libwebp-dev libheif-dev libde265-dev \
            libjxl-dev libgif-dev libcgif-dev libaom-dev \
            libheif-plugin-x265 libheif-plugin-aomenc libjemalloc-dev

      - name: Cache libvips
        id: cache-vips
        uses: actions/cache@v5
        with:
          # Cache a local, runner-owned directory instead of /usr/local
          path: ~/vips-prefix
          key: ${{ runner.os }}-vips-${{ hashFiles('scripts/install-vips.sh') }}

      - name: Compile libvips
        if: steps.cache-vips.outputs.cache-hit != 'true'
        # Run WITHOUT sudo so files are owned by the runner
        run: |
          chmod +x ./scripts/install-vips.sh
          ./scripts/install-vips.sh --prefix ~/vips-prefix

      - name: Install libvips to System
        run: |
          sudo cp -a ~/vips-prefix/* /usr/local/
          sudo ldconfig

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Test with Gradle
        env:
          # Force the JVM and all native calls to use jemalloc
          LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libjemalloc.so
        # Build the shadow jar explicitly alongside the tests
        run: ./gradlew build :service:shadowJar

      - name: Log in to the Container registry
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/dmaiken13/konifer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
