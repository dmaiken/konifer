name: Build and Package Konifer

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docker-compose.yml"
      - ".github/release.yml"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docker-compose.yml"
      - ".github/release.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            ld_path: x86_64-linux-gnu
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            ld_path: aarch64-linux-gnu

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config ninja-build wget meson \
            glib2.0-dev libexif-dev libexpat1-dev libfftw3-dev \
            libimagequant-dev libjpeg-turbo8-dev liblcms2-dev \
            libpango1.0-dev libpng-dev \
            libwebp-dev libheif-dev libde265-dev \
            libjxl-dev libgif-dev libcgif-dev libaom-dev \
            libheif-plugin-x265 libheif-plugin-aomenc libjemalloc-dev

      - name: Cache libvips
        id: cache-vips
        uses: actions/cache@v5
        with:
          path: ~/vips-prefix
          key: ${{ runner.os }}-${{ matrix.arch }}-vips-${{ hashFiles('scripts/install-vips.sh') }}

      - name: Compile libvips
        if: steps.cache-vips.outputs.cache-hit != 'true'
        run: |
          chmod +x ./scripts/install-vips.sh
          ./scripts/install-vips.sh --prefix ~/vips-prefix

      - name: Install libvips to System
        run: |
          sudo cp -a ~/vips-prefix/* /usr/local/
          sudo ldconfig

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Test with Gradle
        env:
          LD_PRELOAD: /usr/lib/${{ matrix.ld_path }}/libjemalloc.so
        run: ./gradlew build :service:shadowJar

      - name: Log in to the Container registry
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Arch-Specific Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}

  merge:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      packages: write
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create Multi-Arch Manifest
        # Docker Imagetools pulls the two temporary tags and maps them to 'latest'
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-arm64